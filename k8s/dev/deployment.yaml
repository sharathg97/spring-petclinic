apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-petclinic-app
  namespace: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
        - name: spring-container
          image: sharacrcontreg.azurecr.io/petclinic-app:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
